title: Steve Hipwell
baseURL: https://steve.hipwell.xyz

# This is what goes in <html lang="">
languageCode: en-us

# This defines how dates are formatted
defaultContentLanguage: en-gb

# Enable emojis globally
enableEmoji: true
ignoreErrors:
  - additional-script-loading-error # ignore error of loading additional scripts.

# Hugo module configuration
module:
  proxy: direct
  hugoVersion:
    extended: true
    min: 0.155.3
  imports:
    - path: github.com/hugo-sid/hugo-blog-awesome
      disable: false

# Configure markup and syntax highlighting
markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false

# Configure main menu
menu:
  main:
    - pageRef: /
      name: home
      url: /
      weight: 10
    - pageRef: posts
      name: posts
      url: /posts/
      weight: 20
    - pageRef: about
      name: about
      url: /about/
      weight: 30

# Configure params for the site
params:
  sitename: Steve Hipwell
  defaultColor: dark
  description: A window into my world!
  author:
    name: Steve Hipwell
    intro: Steve Hipwell
    description: Strong opinions, loosely held.
    avatar: /images/avatar.jpg
    email: steve.hipwell@gmail.com
  browserconfig:
    TileColor: "#2d89ef"
  socialIcons:
    - name: github
      url: https://github.com/stevehipwell
    - name: linkedin
      url: https://www.linkedin.com/in/stevehipwell
    - name: bluesky
      url: https://bsky.app/profile/steve.hipwell.xyz
    - name: mastodon
      url: https://hachyderm.io/@stevehipwell
    - name: twitter
      url: https://twitter.com/stevehipwell
    - name: RSS
      url: /index.xml
